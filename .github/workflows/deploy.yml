name: CD devops 2025 - deploy with ansible

#trigger this workflow once "CD devops 2025 - build and push docker images" finishes on main
on:
  workflow_run:
    workflows: ["CD devops 2025 - build and push docker images"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # run only when the build-and-push-docker-image workflow passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/takima_id_rsa
          chmod 600 ~/.ssh/takima_id_rsa

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml
