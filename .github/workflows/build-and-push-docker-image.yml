name: CD devops 2025 - build and push docker images

#trigger this workflow once "CI devops 2025 - test backend" finishes on main
on:
  workflow_run:
    workflows: ["CI devops 2025 - test backend"]
    types: [completed]
    branches: [main]

jobs:
  # define job to build and publish docker image
  build-and-push-docker-image:
    # run only when the test-backend workflow passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    # steps to perform in job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # relative path to the place where source code with Dockerfile is located
          context: ./simple-api
          # Note: tags has to be all lower-case
          tags: ${{secrets.DOCKERHUB_USERNAME}}/tp-devops-simple-api:latest
          push: true

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{secrets.DOCKERHUB_USERNAME}}/tp-devops-database:latest
          push: true

      - name: Build image and push front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          tags: ${{secrets.DOCKERHUB_USERNAME}}/tp-devops-front:latest
          push: true

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{secrets.DOCKERHUB_USERNAME}}/tp-devops-httpd:latest
          push: true
